<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Will You Be My Girlfriend?</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #ff758c 0%, #ff7eb3 100%);
            font-family: Arial, sans-serif;
            color: white;
            text-align: center;
        }
        h1 { font-size: 2.5rem; margin-bottom: 10px; }
        h2 { font-size: 1.8rem; margin-bottom: 30px; color: #fff0f5; }
        .buttons { display: flex; gap: 20px; align-items: center; }
        button {
            padding: 15px 30px;
            font-size: 1.2rem;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            transition: transform 0.2s;
        }
        #yesBtn { background-color: #ff3366; color: white; font-weight: bold; }
        #noBtn { background-color: rgba(255, 255, 255, 0.3); color: white; position: relative; }
    </style>
</head>
<body>

    <h1>Will you be my girlfriend?</h1>
    <h2>Sweekriti 💖</h2>

    <div class="buttons">
        <button id="yesBtn" onclick="alert('Yay! ❤️')">Yes 💕</button>
        <button id="noBtn" onmouseover="moveButton()">No 😏</button>
    </div>

    <script>
        function moveButton() {
            const noBtn = document.getElementById('noBtn');
            const x = Math.random() * (window.innerWidth - noBtn.offsetWidth);
            const y = Math.random() * (window.innerHeight - noBtn.offsetHeight);
            noBtn.style.position = 'absolute';
            noBtn.style.left = x + 'px';
            noBtn.style.top = y + 'px';
        }
    </script>
</body>
</html>
